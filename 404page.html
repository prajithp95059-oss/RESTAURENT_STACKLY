<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Lato', Arial, sans-serif;
    }

body {
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
  padding: 40px 24px;
  text-align: center;
}

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,162,39,.05) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,162,39,.05) 80px);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
      z-index: 0;
    }
    .orb-1 { width: 420px; height: 420px; top: -100px; right: -100px; background: radial-gradient(circle, rgba(201,162,39,.09) 0%, transparent 70%); animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; bottom: -80px; left: -80px; background: radial-gradient(circle, rgba(220,38,38,.07) 0%, transparent 70%); animation-delay: -3s; }
    .orb-3 { width: 200px; height: 200px; top: 50%; left: 8%; background: radial-gradient(circle, rgba(201,162,39,.05) 0%, transparent 70%); animation-delay: -5s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(20px, -20px) scale(1.05); }
      66%       { transform: translate(-15px, 15px) scale(0.97); }
    }

    /* Particles */
    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleDrift linear infinite;
      opacity: 0;
    }
    @keyframes particleDrift {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
    }

    /* Main container */
   .container {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 580px;
  width: 100%;
  margin: 0 auto;
  animation: entryFadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
}

    @keyframes entryFadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand label */
    .brand-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 28px;
      animation: entryFadeUp 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .brand-name { color: #ffffff; }
    .brand-dot  { color: #dc2626; }
    .brand-rest { color: #dc2626; }
    .brand-label::before,
    .brand-label::after {
      content: '';
      width: 28px;
      height: 1px;
      flex-shrink: 0;
    }
    .brand-label::before { background: linear-gradient(90deg, transparent, #c9a227); }
    .brand-label::after  { background: linear-gradient(90deg, #c9a227, transparent); }

    /* 404 number */
    .ring-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 4px;
    }
    .pulse-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(220,38,38,.2);
      animation: ringPulse 3s ease-in-out infinite 2s;
      pointer-events: none;
    }
    .pulse-ring-2 {
      position: absolute;
      inset: -44px;
      border-radius: 50%;
      border: 1px solid rgba(201,162,39,.1);
      animation: ringPulse 3s ease-in-out infinite 2.5s;
      pointer-events: none;
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(0.92); opacity: 0; }
      50%       { transform: scale(1);    opacity: 1; }
    }

    .heading-404 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(6rem, 20vw, 10.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -4px;
      display: inline-block;
      animation: entryFadeUp 0.9s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .digit-4 {
      color: #e8c55a;
      display: inline-block;
      animation: digit4Bounce 3s ease-in-out infinite 1.2s;
    }
    .digit-0 {
      color: #dc2626;
      font-style: italic;
      display: inline-block;
      animation: zeroSpin 6s ease-in-out infinite 1.5s, zeroGlow 3s ease-in-out infinite 1.5s;
      text-shadow: 0 0 40px rgba(220,38,38,.4);
    }
    .digit-4b {
      color: #e8c55a;
      display: inline-block;
      animation: digit4Bounce 3s ease-in-out infinite 1.8s;
    }

    @keyframes digit4Bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes zeroSpin {
      0%, 85%, 100% { transform: rotateY(0deg) scale(1); }
      92%            { transform: rotateY(360deg) scale(1.08); }
    }
    @keyframes zeroGlow {
      0%, 100% { text-shadow: 0 0 30px rgba(220,38,38,.3); }
      50%       { text-shadow: 0 0 70px rgba(220,38,38,.75), 0 0 120px rgba(220,38,38,.3); }
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a227, transparent);
      margin: 22px auto;
      animation: dividerGrow 1s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes dividerGrow {
      from { width: 0; opacity: 0; }
      to   { width: 60px; opacity: 1; }
    }

    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 14px;
      animation: entryFadeUp 0.9s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    p {
      color: #888;
      font-size: 0.93rem;
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 40px;
      max-width: 390px;
      margin-left: auto;
      margin-right: auto;
      animation: entryFadeUp 0.9s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      animation: entryFadeUp 0.9s 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }

    .btn-ghost {
      padding: 13px 28px;
      background: transparent;
      color: #999;
      border: 1px solid rgba(255,255,255,.12);
      font-family: 'Lato', Arial, sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: border-color .3s, color .3s, transform .2s, background .3s;
    }
    .btn-ghost:hover {
      border-color: #c9a227;
      color: #c9a227;
      background: rgba(201,162,39,.06);
      transform: translateY(-3px);
    }
    .btn-ghost:active { transform: scale(0.97); }

    .btn-primary {
      padding: 13px 28px;
      background: #c9a227;
      color: #0a0a0a;
      border: none;
      font-family: 'Lato', Arial, sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      transition: background .3s, transform .2s, box-shadow .3s;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.2) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .btn-primary:hover::before { transform: translateX(100%); }
    .btn-primary:hover {
      background: #e8c55a;
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(201,162,39,.4);
    }
    .btn-primary:active { transform: scale(0.97); }

    /* Footer note */
    .footer-note {
      margin-top: 52px;
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #444;
      font-weight: 400;
      animation: entryFadeUp 0.9s 0.65s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ============================================================
       RESPONSIVE — 404 PAGE (ALL BREAKPOINTS)
       ============================================================ */

    /* 768px — Tablet portrait / large phone landscape */
    @media (max-width: 768px) {
      .container { max-width: 520px; }
    }

    /* 640px — Large phone portrait */
    @media (max-width: 640px) {
      .container { max-width: 460px; }
    }

    /* 480px — Standard phone portrait */
    @media (max-width: 480px) {
      .heading-404 { letter-spacing: -2px; }
      .btn-group { flex-direction: column; align-items: center; }
      .btn-primary, .btn-ghost { width: 100%; justify-content: center; }
    }

    /* 425px — Large phone portrait */
    @media (max-width: 425px) {
      .heading-404 { font-size: clamp(5.5rem, 20vw, 9rem); }
    }

    /* 375px — iPhone SE / small phones */
    @media (max-width: 375px) {
      .heading-404 { font-size: clamp(5rem, 20vw, 8rem); }
    }

    /* 320px — Very small phones */
    @media (max-width: 320px) {
      .heading-404 { font-size: 5rem; }
    }

    /* Accessibility — respect reduced-motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
</style>
</head>
<body>

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Main content -->
  <div class="container">

    <div class="brand-label">
      <span class="brand-name">Stackly</span>
      <span class="brand-dot">&middot;</span>
      <span class="brand-rest">Restaurant</span>
    </div>

    <div class="ring-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-ring-2"></div>
      <div class="heading-404">
        <span class="digit-4">4</span><span class="digit-0">0</span><span class="digit-4b">4</span>
      </div>
    </div>

    <div class="divider"></div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist, has been moved, or is temporarily unavailable.</p>

    <div class="btn-group">
      <a href="javascript:history.back()" class="btn-ghost">&#8592; Go Back</a>
      <a href="./index.html" class="btn-primary">&#8962; Go Home</a>
    </div>

    <p class="footer-note">&copy; 2026 Stackly &middot; All Rights Reserved</p>
  </div>

  <script>
    // Generate floating particles
    (function () {
      var container = document.getElementById('particles');
      if (!container) return;
      var colors = [
        'rgba(201,162,39,',
        'rgba(220,38,38,',
        'rgba(232,197,90,'
      ];
      for (var i = 0; i < 28; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        var size    = (Math.random() * 4 + 2).toFixed(1);
        var col     = colors[Math.floor(Math.random() * colors.length)];
        var opacity = (Math.random() * 0.4 + 0.15).toFixed(2);
        p.style.cssText = [
          'width:'  + size + 'px',
          'height:' + size + 'px',
          'left:'   + (Math.random() * 100).toFixed(1) + '%',
          'background:' + col + opacity + ')',
          'animation-duration:' + (Math.random() * 12 + 8).toFixed(1) + 's',
          'animation-delay:'   + (-(Math.random() * 15)).toFixed(1) + 's'
        ].join(';');
        container.appendChild(p);
      }
    })();

    // Scroll-reveal (kept for compatibility if page is embedded)
    (function () {
      if (!window.IntersectionObserver) return;
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.fade-up, .fade-in, .sa').forEach(function (el) { obs.observe(el); });
    })();
  </script>
</body>
</html>

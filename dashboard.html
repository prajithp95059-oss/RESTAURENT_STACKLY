<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Stackly Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════ */
:root {
  --black:   #080808;
  --dark:    #0f0f0f;
  --card:    #181818;
  --card2:   #212121;
  --card3:   #2a2a2a;
  --red:     #ff4d4d;
  --red-lt:  #ff7070;
  --white:   #fafafa;
  --muted:   rgba(250,250,250,0.42);
  --border:  rgba(255,77,77,0.12);
  --border2: rgba(250,250,250,0.08);
  --gold:    #f0c060;
  --green:   #22c55e;
  --blue:    #3b82f6;
  --serif:   'Bebas Neue', Impact, sans-serif;
  --sans:    'Outfit', sans-serif;
  --sb:      252px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--sans); background:var(--dark); color:var(--white); min-height:100vh; display:flex; overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; border:none; font-family:var(--sans); }

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.sidebar {
  width: var(--sb);
  background: var(--black);
  border-right: 1px solid var(--border2);
  display: flex; flex-direction: column;
  position: fixed; top:0; left:0; bottom:0; z-index:300;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}

/* Logo row */
.sb-logo {
  padding: 18px 20px 16px;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.sb-logo { text-decoration: none; color: inherit; cursor: pointer; }
.sb-logo-img  { width:34px; height:34px; object-fit:contain; flex-shrink:0; }
.sb-logo-text { font-family:var(--serif); font-size:24px; letter-spacing:3px; line-height:1; }
.sb-logo-stack { color:var(--white); }
.sb-logo-ly    { color:var(--red); }
.sb-logo-dot   { width:8px; height:8px; background:var(--red); border-radius:50%; margin-left:2px; flex-shrink:0; animation:pulse 2s ease-in-out infinite; }

/* User panel — matches screenshot layout */
.sb-user {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.sb-avatar {
  width: 42px; height: 42px; border-radius:50%;
  display: flex; align-items:center; justify-content:center;
  font-family: var(--serif); font-size:18px; color:var(--white);
  flex-shrink:0; border:2px solid rgba(255,77,77,.35);
  background: var(--red);
}
.sb-user-info  { flex:1; min-width:0; }
.sb-user-name  { font-size:13px; font-weight:700; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.sb-user-email { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-role-badge { font-size:8px; font-weight:700; padding:3px 8px; letter-spacing:1.5px; text-transform:uppercase; flex-shrink:0; border-radius:2px; }
.rb-admin { color:var(--red);  background:rgba(255,77,77,.12); border:1px solid rgba(255,77,77,.3); }
.rb-staff { color:var(--gold); background:rgba(240,192,96,.1);  border:1px solid rgba(240,192,96,.3); }

/* Nav */
.sb-nav { flex:1; padding:10px 0; overflow-y:auto; overflow-x:hidden; }
.sb-nav::-webkit-scrollbar { width:3px; }
.sb-nav::-webkit-scrollbar-track { background:transparent; }
.sb-nav::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.nav-lbl {
  padding:8px 20px 4px;
  font-size:9px; font-weight:700; color:rgba(250,250,250,.22);
  letter-spacing:2.5px; text-transform:uppercase;
}
.nav-btn {
  display:flex; align-items:center; gap:12px;
  padding:11px 20px; width:100%;
  font-size:13px; font-weight:500; color:var(--muted);
  background:none; border:none; border-left:3px solid transparent;
  transition:all .18s; text-align:left; letter-spacing:.2px;
}
.nav-btn:hover  { color:var(--white); background:rgba(255,77,77,.05); }
.nav-btn.active { color:var(--white); font-weight:600; border-left-color:var(--red); background:rgba(255,77,77,.09); }
.nav-btn .ni    { font-size:16px; flex-shrink:0; width:20px; text-align:center; }
.nav-badge {
  margin-left:auto; background:var(--red); color:var(--white);
  font-size:9px; font-weight:700; padding:2px 7px;
  border-radius:10px; min-width:20px; text-align:center;
}

/* Footer — Home + Sign Out (matches screenshot) */
.sb-footer { border-top:1px solid var(--border2); flex-shrink:0; }
.sb-footer-btn {
  display:flex; align-items:center; gap:12px;
  padding:12px 20px; width:100%;
  font-size:13px; font-weight:500; color:var(--muted);
  background:none; border:none; transition:all .18s; text-align:left;
}
.sb-footer-btn .ni { font-size:16px; flex-shrink:0; width:20px; text-align:center; }
.sb-footer-btn:hover { color:var(--white); background:rgba(255,255,255,.04); }
.sb-footer-btn.so:hover { color:var(--red); background:rgba(255,77,77,.06); }

/* ══════════════════════════════════
   MAIN
══════════════════════════════════ */
.main { margin-left:var(--sb); flex:1; min-height:100vh; display:flex; flex-direction:column; }

/* Topbar */
.topbar {
  background:var(--black); border-bottom:1px solid var(--border2);
  padding:0 28px; height:58px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.topbar-l { display:flex; align-items:center; gap:12px; }
.ham { display:none; background:none; border:none; color:var(--white); font-size:20px; padding:4px; }
.tb-title { font-family:var(--serif); font-size:20px; letter-spacing:2px; color:var(--white); }
.tb-title span { color:var(--red); }
.topbar-r { display:flex; align-items:center; gap:14px; }
.tb-time  { font-size:11px; color:var(--muted); letter-spacing:.5px; font-variant-numeric:tabular-nums; }
.tb-badge {
  display:flex; align-items:center; gap:6px;
  padding:5px 12px; font-size:10px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
}
.tb-badge.open   { color:var(--green); background:rgba(34,197,94,.1);   border:1px solid rgba(34,197,94,.2); }
.tb-badge.active { color:var(--gold);  background:rgba(240,192,96,.1);  border:1px solid rgba(240,192,96,.2); }
.bd { width:6px; height:6px; border-radius:50%; animation:pulse 2s ease-in-out infinite; }
.tb-bell {
  position:relative; background:none; border:none; color:var(--muted);
  font-size:18px; padding:4px; transition:color .2s;
}
.tb-bell:hover { color:var(--white); }
.bell-dot {
  position:absolute; top:2px; right:2px;
  width:8px; height:8px; background:var(--red);
  border-radius:50%; border:2px solid var(--black);
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Page area */
.page { padding:24px 28px; flex:1; }

/* ══════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════ */
/* Section header */
.sec-hdr { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.sec-lbl {
  display:inline-flex; align-items:center; gap:8px;
  font-size:9px; font-weight:700; color:var(--red);
  letter-spacing:4px; text-transform:uppercase; margin-bottom:4px;
}
.sec-lbl::before { content:''; width:20px; height:2px; background:var(--red); }
.sec-title { font-family:var(--serif); font-size:26px; letter-spacing:2px; color:var(--white); }
.sec-title span { color:var(--red); }

/* Card */
.card { background:var(--card); border:1px solid var(--border2); overflow:hidden; }
.card-hdr {
  padding:14px 20px; border-bottom:1px solid var(--border2);
  display:flex; align-items:center; justify-content:space-between;
}
.card-ttl { font-family:var(--serif); font-size:17px; letter-spacing:2px; color:var(--white); }
.card-ttl span { color:var(--red); }
.card-act {
  font-size:10px; font-weight:700; color:var(--red);
  letter-spacing:1.5px; text-transform:uppercase;
  background:none; border:none; transition:color .2s;
}
.card-act:hover { color:var(--red-lt); }

/* KPI grid */
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.kpi {
  background:var(--card); border:1px solid var(--border2);
  padding:18px 20px; transition:transform .25s,box-shadow .25s;
}
.kpi:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,.5); }
.kpi-lbl  { font-size:9px; font-weight:700; color:var(--muted); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:8px; }
.kpi-val  { font-family:var(--serif); font-size:38px; line-height:1; margin-bottom:6px; letter-spacing:1px; }
.kpi-foot { display:flex; align-items:center; gap:6px; }
.kpi-sub  { font-size:10px; color:var(--muted); }
.kpi-chg  { font-size:11px; font-weight:700; padding:2px 7px; letter-spacing:.5px; }
.up   { color:var(--green); background:rgba(34,197,94,.1); }
.down { color:var(--red);   background:rgba(255,77,77,.1); }
.kpi-per { font-size:10px; color:var(--muted); }
.kv-red   .kpi-val { color:var(--red); }
.kv-gold  .kpi-val { color:var(--gold); }
.kv-green .kpi-val { color:var(--green); }
.kv-blue  .kpi-val { color:var(--blue); }
.kv-white .kpi-val { color:var(--white); }

/* Status pills */
.pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; font-size:9px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
}
.pill::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.p-ready   { color:var(--green);               background:rgba(34,197,94,.1); }
.p-ready::before   { background:var(--green); }
.p-cooking { color:var(--gold);                background:rgba(240,192,96,.1); }
.p-cooking::before { background:var(--gold); }
.p-pending { color:var(--muted);               background:var(--border2); }
.p-pending::before { background:var(--muted); }
.p-served  { color:rgba(250,250,250,.25);       background:rgba(250,250,250,.04); }
.p-served::before  { background:rgba(250,250,250,.2); }

/* Table */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead th { padding:10px 18px; text-align:left; font-size:9px; font-weight:700; color:rgba(250,250,250,.3); letter-spacing:2px; text-transform:uppercase; border-bottom:1px solid var(--border2); }
tbody tr { border-bottom:1px solid var(--border2); transition:background .15s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:rgba(255,255,255,.02); }
tbody td { padding:12px 18px; font-size:12px; color:var(--muted); }
.td-id  { font-weight:700; color:var(--white); font-size:13px; }
.td-tbl { color:var(--white); font-weight:500; }
.td-amt { color:var(--white); font-weight:600; font-family:var(--serif); font-size:15px; }

/* Overlay */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:290; backdrop-filter:blur(3px); }
.overlay.show { display:block; }

/* Toast */
.toast {
  position:fixed; top:16px; right:20px; z-index:9999;
  background:var(--card); color:var(--white);
  padding:12px 20px; border:1px solid var(--border2);
  font-size:12px; letter-spacing:.4px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  opacity:0; transform:translateY(-10px);
  transition:all .3s cubic-bezier(.16,1,.3,1); pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }
.toast.ok   { border-color:rgba(34,197,94,.3); }

/* Greeting banner */
.greet-banner {
  background:linear-gradient(120deg,#0d0d1a 0%,#170a0a 60%,rgba(255,77,77,.1) 100%);
  border:1px solid var(--border2); border-left:3px solid var(--red);
  padding:18px 22px;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; flex-wrap:wrap; gap:14px;
}
.greet-name { font-family:var(--serif); font-size:26px; letter-spacing:2px; color:var(--white); margin-bottom:3px; }
.greet-name span { color:var(--red); }
.greet-sub  { font-size:12px; color:var(--muted); }
.greet-r    { display:flex; align-items:center; gap:18px; }
.greet-stat { text-align:center; }
.gs-val { font-family:var(--serif); font-size:22px; color:var(--gold); display:block; line-height:1; }
.gs-lbl { font-size:9px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:3px; display:block; }
.gs-div { width:1px; height:36px; background:var(--border2); }
.clock-btn {
  background:var(--red); color:var(--white); border:none;
  padding:10px 20px; font-family:var(--serif); font-size:16px;
  letter-spacing:2px; text-transform:uppercase; transition:all .2s;
}
.clock-btn:hover { background:var(--red-lt); transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,77,77,.4); }
.clock-btn.in { background:var(--card2); border:1px solid var(--border2); color:var(--muted); font-size:14px; }
.clock-btn.in:hover { border-color:rgba(250,250,250,.2); color:var(--white); box-shadow:none; transform:none; }

/* ══════════════════════════════════
   ADMIN LAYOUT
══════════════════════════════════ */
.a-mid  { display:grid; grid-template-columns:1fr 320px; gap:18px; margin-bottom:20px; }
.a-bot  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; }

/* Activity feed */
.feed-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--border2);
}
.feed-item:last-child { border-bottom:none; }
.feed-icon {
  width:30px; height:30px; background:var(--card2); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;
}
.feed-body { flex:1; }
.feed-txt  { font-size:12px; color:var(--white); line-height:1.4; margin-bottom:2px; }
.feed-txt span { color:var(--red); font-weight:600; }
.feed-time { font-size:10px; color:var(--muted); }

/* Top dishes */
.dish-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--border2); transition:background .15s;
}
.dish-row:last-child { border-bottom:none; }
.dish-row:hover { background:rgba(255,255,255,.02); }
.dish-rank  { font-family:var(--serif); font-size:16px; color:rgba(250,250,250,.15); width:22px; flex-shrink:0; text-align:right; }
.dish-info  { flex:1; min-width:0; }
.dish-name  { font-size:12px; font-weight:600; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.dish-cat   { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.dish-count { font-family:var(--serif); font-size:18px; color:var(--red); }

/* Staff list */
.staff-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--border2);
}
.staff-row:last-child { border-bottom:none; }
.staff-av {
  width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:14px; color:var(--white);
  flex-shrink:0; border:1px solid var(--border2);
}
.staff-info { flex:1; min-width:0; }
.staff-nm   { font-size:12px; font-weight:600; color:var(--white); margin-bottom:2px; }
.staff-rl   { font-size:10px; color:var(--muted); }
.s-on  { color:var(--green); background:rgba(34,197,94,.1);     font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; }
.s-off { color:var(--muted);  background:rgba(250,250,250,.05); font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; }

/* Reservations */
.res-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--border2);
}
.res-row:last-child { border-bottom:none; }
.res-time-blk { background:var(--red); padding:6px 10px; text-align:center; flex-shrink:0; min-width:52px; }
.res-time-blk.dim { background:var(--card3); }
.res-t  { font-family:var(--serif); font-size:16px; color:var(--white); display:block; line-height:1; }
.res-ap { font-size:8px; color:rgba(255,255,255,.7); letter-spacing:1px; text-transform:uppercase; }
.res-info { flex:1; min-width:0; }
.res-nm { font-size:12px; font-weight:600; color:var(--white); margin-bottom:2px; }
.res-dt { font-size:10px; color:var(--muted); }
.res-g  { font-family:var(--serif); font-size:20px; color:rgba(250,250,250,.2); }

/* ══════════════════════════════════
   STAFF LAYOUT
══════════════════════════════════ */
.s-mid  { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:20px; }
.s-bot  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; }

/* Table cells (floor view) */
.floor-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:14px; }
.t-cell {
  border:1px solid var(--border2); padding:12px 10px; text-align:center;
  cursor:pointer; transition:all .2s; position:relative;
}
.t-cell:hover { border-color:rgba(250,250,250,.2); background:rgba(255,255,255,.02); }
.t-mine { border-color:rgba(255,77,77,.4);   background:rgba(255,77,77,.06); }
.t-busy { border-color:rgba(240,192,96,.35); background:rgba(240,192,96,.06); }
.t-free { border-color:rgba(34,197,94,.2);   background:rgba(34,197,94,.04); }
.t-num  { font-family:var(--serif); font-size:22px; color:var(--white); line-height:1; margin-bottom:4px; }
.t-stat { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.t-mine .t-stat { color:var(--red); }
.t-busy .t-stat { color:var(--gold); }
.t-free .t-stat { color:var(--green); }
.t-guests { font-size:10px; color:var(--muted); margin-top:2px; }
.t-dot { position:absolute; top:6px; right:6px; width:6px; height:6px; background:var(--red); border-radius:50%; }

/* Order rows (staff) */
.ord-row {
  display:flex; align-items:center; gap:14px;
  padding:13px 18px; border-bottom:1px solid var(--border2); transition:background .15s;
}
.ord-row:last-child { border-bottom:none; }
.ord-row:hover { background:rgba(255,255,255,.02); }
.ord-tag {
  background:var(--card2); border:1px solid var(--border2);
  padding:6px 10px; text-align:center; flex-shrink:0; min-width:46px;
}
.ord-tag .ot-lbl { display:block; font-size:8px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.ord-tag .ot-num { font-family:var(--serif); font-size:18px; color:var(--white); line-height:1; }
.ord-det { flex:1; min-width:0; }
.ord-id  { font-size:11px; font-weight:700; color:var(--white); margin-bottom:2px; }
.ord-itm { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ord-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.ord-amt  { font-family:var(--serif); font-size:17px; color:var(--white); }

/* Tasks */
.task-row {
  display:flex; align-items:flex-start; gap:12px;
  padding:13px 18px; border-bottom:1px solid var(--border2);
  cursor:pointer; transition:background .15s;
}
.task-row:last-child { border-bottom:none; }
.task-row:hover { background:rgba(255,255,255,.02); }
.task-chk {
  width:18px; height:18px; border:1.5px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:1px; transition:all .2s; font-size:10px; color:transparent;
}
.task-row.done .task-chk { background:var(--green); border-color:var(--green); color:var(--black); }
.task-body { flex:1; }
.task-txt  { font-size:12px; color:var(--white); margin-bottom:3px; line-height:1.4; }
.task-row.done .task-txt { color:var(--muted); text-decoration:line-through; }
.task-meta { font-size:10px; color:var(--muted); }
.t-pri { font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:2px 7px; flex-shrink:0; margin-top:2px; }
.tp-hi { color:var(--red);  background:rgba(255,77,77,.1); }
.tp-md { color:var(--gold); background:rgba(240,192,96,.1); }

/* 1536px — Large desktops / 4K scaled */
@media (max-width: 1536px) {
  .page { padding: 22px 26px; }
}

/* 1280px — Standard desktop */
@media (max-width: 1280px) {

/* 768px — Tablet portrait / large phone landscape (sidebar collapses) */
@media (max-width: 768px) {

  .main { margin-left: 0; }
  .ham { display: block; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .a-bot { grid-template-columns: 1fr; }

  .s-bot .card:last-child { grid-column: span 1; }
  .tb-time { display: none; }
  .greet-r { display: none; }
}

/* 640px — Large phone portrait */
@media (max-width: 640px) {
  .page { padding: 14px; }
  .floor-grid { grid-template-columns: repeat(3, 1fr); }
}

/* 480px — Standard phone portrait */
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi { padding: 14px; }
  .kpi-val { font-size: 28px; }
  .page { padding: 12px; }
  .floor-grid { grid-template-columns: repeat(3, 1fr); }
}

/* 425px — Large phone portrait */
@media (max-width: 425px) {
  .page { padding: 11px; }
  .kpi-val { font-size: 26px; }
}

/* 375px — iPhone SE / small phones */
@media (max-width: 375px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .page { padding: 10px; }
  .topbar { padding: 0 12px; }

}

/* 320px — Very small phones */
@media (max-width: 320px) {
  .page { padding: 8px; }

}

/* Accessibility — respect reduced-motion preference */
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
var ROLE, USER, EMAIL;
var clockedIn   = true;
var shiftStart  = Date.now() - (4*3600000 + 22*60000);
var tasksDone   = 2;
var tasksTotal  = 6;

function init() {
  ROLE  = localStorage.getItem('role')  || 'admin';
  USER  = localStorage.getItem('user')  || (ROLE === 'admin' ? 'Admin' : 'Staff');
  EMAIL = localStorage.getItem('email') || USER.toLowerCase().replace(/ /g,'') + '@stackly.com';

  /* Sidebar user panel */
  var av = document.getElementById('sbAvatar');
  av.textContent = USER.charAt(0).toUpperCase();
  document.getElementById('sbName').textContent  = USER;
  document.getElementById('sbEmail').textContent = EMAIL;

  if (ROLE === 'staff') {
    av.style.background = 'var(--gold)';
    av.style.color      = 'var(--black)';
    document.getElementById('sbBadge').textContent  = 'Staff';
    document.getElementById('sbBadge').className    = 'sb-role-badge rb-staff';
    document.getElementById('tbBadge').className    = 'tb-badge active';
    document.getElementById('bdTxt').textContent    = 'Shift Active';
    document.getElementById('bdDot').style.background = 'var(--gold)';
  }

  buildNav();
  buildPage();

  tick();
  setInterval(tick, 1000);
  if (ROLE === 'staff') { updateShift(); setInterval(updateShift, 1000); }
}

/* ═══════════════════════════════════════
   CLOCK
═══════════════════════════════════════ */
function tick() {
  var n = new Date(), h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  var am = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    h + ':' + pad(m) + ':' + pad(s) + ' ' + am;
}
function pad(v) { return v.toString().padStart(2,'0'); }

function fmtDate() {
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var mon  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d = new Date();
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + mon[d.getMonth()] + ' ' + d.getFullYear();
}
function updateShift() {
  var el = document.getElementById('shiftDur');
  if (!el) return;
  var e = Math.floor((Date.now() - shiftStart) / 1000);
  el.textContent = Math.floor(e/3600) + ':' + pad(Math.floor((e%3600)/60));
}

function buildNav() {
  var nav  = ROLE === 'admin' ? ADMIN_NAV : STAFF_NAV;

  nav.forEach(function(n) {
    if (n.lbl) {
      html += '<div class="nav-lbl"' + (n.mt ? ' style="margin-top:8px"' : '') + '>' + n.lbl + '</div>';
    } else {
      html += '<button class="nav-btn' + (n.active ? ' active' : '') + '"'
            + (n.id ? ' id="' + n.id + '"' : '')
            + ' onclick="navClick(this,\'' + n.text + '\')">'
            + '<span class="ni">' + n.icon + '</span> ' + n.text
            + (n.badge ? '<span class="nav-badge">' + n.badge + '</span>' : '')
            + '</button>';
    }
  });
  document.getElementById('sbNav').innerHTML = html;
}
function navClick(el, name) {
  // Dashboard = current page, no redirect needed
  if (name === 'Dashboard' || name === 'My Dashboard') {
    document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');

/* ═══════════════════════════════════════
   HTML BUILDER HELPERS
═══════════════════════════════════════ */
function kpi(cls, lbl, val, foot) {
  return '<div class="kpi ' + cls + '"><div class="kpi-lbl">' + lbl + '</div><div class="kpi-val">' + val + '</div><div class="kpi-foot">' + foot + '</div></div>';
}
function tr(id, tbl, items, pillCls, pillTxt, amt, time) {
  return '<tr><td class="td-id">' + id + '</td><td class="td-tbl">' + tbl + '</td><td>' + items + '</td>' +
    '<td><span class="pill ' + pillCls + '">' + pillTxt + '</span></td>' +
    '<td class="td-amt">' + amt + '</td><td style="font-size:11px;color:var(--muted)">' + time + '</td></tr>';
}
function feed(icon, txt, time) {
  return '<div class="feed-item"><div class="feed-icon">' + icon + '</div>' +
    '<div class="feed-body"><div class="feed-txt">' + txt + '</div><div class="feed-time">' + time + '</div></div></div>';
}
function dish(rank, name, cat, cnt) {
  return '<div class="dish-row"><div class="dish-rank">' + rank + '</div>' +
    '<div class="dish-info"><div class="dish-name">' + name + '</div><div class="dish-cat">' + cat + '</div></div>' +

function staff(init, bg, name, role, on) {
  return '<div class="staff-row"><div class="staff-av" style="background:' + bg + '">' + init + '</div>' +
    '<div class="staff-info"><div class="staff-nm">' + name + '</div><div class="staff-rl">' + role + '</div></div>' +
    '<span class="' + (on ? 's-on' : 's-off') + '">' + (on ? 'On' : 'Off') + '</span></div>';
}
function res(time, ap, dim, name, detail, guests) {
  return '<div class="res-row"><div class="res-time-blk' + (dim ? ' dim' : '') + '"><span class="res-t">' + time + '</span><span class="res-ap">' + ap + '</span></div>' +
    '<div class="res-info"><div class="res-nm">' + name + '</div><div class="res-dt">' + detail + '</div></div>' +
    '<div class="res-g">' + guests + '</div></div>';
}
function tCell(cls, num, stat, guests, dot, msg) {
  return '<div class="t-cell ' + cls + '" onclick="' + (msg ? 'toast(\'' + msg + '\')' : '') + '">' +
    (dot ? '<div class="t-dot"></div>' : '') +
    '<div class="t-num">' + num + '</div><div class="t-stat">' + stat + '</div><div class="t-guests">' + guests + '</div></div>';
}
function legend(bg, border, txt) {
  return '<div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)">' +
    '<div style="width:8px;height:8px;background:' + bg + ';border:1px solid ' + border + '"></div>' + txt + '</div>';
}
function ordRow(tbl, id, items, amt, pillCls, pillTxt) {
  return '<div class="ord-row">' +
    '<div class="ord-tag"><span class="ot-lbl">Table</span><span class="ot-num">' + tbl + '</span></div>' +
    '<div class="ord-det"><div class="ord-id">' + id + '</div><div class="ord-itm">' + items + '</div></div>' +
    '<div class="ord-meta"><div class="ord-amt">' + amt + '</div><span class="pill ' + pillCls + '">' + pillTxt + '</span></div></div>';
}
function taskRow(done, txt, meta, priCls) {
  var priLabel = { 'tp-hi':'High','tp-md':'Med','tp-lo':'Low' };
  return '<div class="task-row' + (done ? ' done' : '') + '" onclick="toggleTask(this)">' +
    '<div class="task-chk">' + (done ? '✓' : '') + '</div>' +
    '<div class="task-body"><div class="task-txt">' + txt + '</div><div class="task-meta">' + meta + '</div></div>' +
    '<span class="t-pri ' + priCls + '">' + priLabel[priCls] + '</span></div>';
}
function specRow(em, name, note, tagCls, tagTxt) {
  return '<div class="spec-row"><div class="spec-em">' + em + '</div>' +
    '<div class="spec-inf"><div class="spec-nm">' + name + '</div><div class="spec-nt">' + note + '</div></div>' +
    '<span class="spec-tag ' + tagCls + '">' + tagTxt + '</span></div>';
}
function perfRow(lbl, val) {
  return '<div class="perf-row"><span class="perf-lbl">' + lbl + '</span><span class="perf-val">' + val + '</span></div>';
}
function getGreeting() {
  var h = new Date().getHours();
  return h < 12 ? 'GOOD MORNING' : h < 17 ? 'GOOD AFTERNOON' : 'GOOD EVENING';
}

/* ═══════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════ */
function toggleClock() {
  clockedIn = !clockedIn;
  var btn = document.getElementById('clockBtn');
  if (!btn) return;
  if (clockedIn) {
    btn.textContent = '✓ Clocked In'; btn.classList.add('in');
    toast('Clocked in successfully!','ok');
  } else {
    btn.textContent = 'Clock Out'; btn.classList.remove('in');
    toast('Confirm clock-out? Click again to confirm.');
  }
}

function toggleTask(el) {
  el.classList.toggle('done');
  el.querySelector('.task-chk').textContent = el.classList.contains('done') ? '✓' : '';
  syncTasks();
  if (el.classList.contains('done')) toast('Task marked complete ✓','ok');
}
function markAllTasks() {
  document.querySelectorAll('.task-row').forEach(function(r) {
    r.classList.add('done');
    r.querySelector('.task-chk').textContent = '✓';
  });
  syncTasks();
  toast('All tasks marked complete ✓','ok');
}
function syncTasks() {
  var done  = document.querySelectorAll('.task-row.done').length;
  var total = document.querySelectorAll('.task-row').length;
  var pct   = total ? Math.round((done/total)*100) : 0;
  var bar   = document.getElementById('taskPerfBar');
  var val   = document.getElementById('taskPerfVal');
  var badge = document.getElementById('taskBadge');
  if (bar)   bar.style.width = pct + '%';
  if (val)   val.textContent = done + ' / ' + total + ' done';
  if (badge) badge.textContent = Math.max(0, total - done);
}

/* ═══════════════════════════════════════
   SIDEBAR TOGGLE
═══════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (type ? ' ' + type : '');
  setTimeout(function(){ t.classList.add('show'); }, 10);
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}/* ── Redirect all card arrow-buttons to 404 page ── */
function go404() { window.location.href = './404page.html'; }

document.addEventListener('click', function (e) {
  var btn = e.target.closest('.card-act');
  if (!btn) return;                                  // not an arrow button
  if (btn.textContent.indexOf('Mark All') !== -1) return;  // keep tasks feature working
  e.preventDefault();
  go404();
});

init();
